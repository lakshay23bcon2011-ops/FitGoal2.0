version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: fitgoal-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: fitgoal-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile.frontend
    container_name: fitgoal-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
